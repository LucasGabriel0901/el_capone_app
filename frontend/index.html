<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Al Capone | Estilo e Exclusividade</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="navbar" data-aos="fade-down" data-aos-duration="1000">
        <div class="logo">AL CAPONE</div>
        <nav>
            <a href="#">Sobre Nós</a>
            <a href="#" onclick="abrirModal('login')">Login</a> 
            <a href="admin.html" class="nav-admin">AdminISTRATIVO</a>
        </nav>
        <div class="nav-botoes">
            <button class="btn-agendar" onclick="abrirModal('cadastro')">AGENDAR HORÁRIO</button>
        </div>
    </header>

    <section class="hero">
        <div class="hero-content" data-aos="fade-right" data-aos-duration="1500">
            <h2 class="subtitulo">SINTA O SEU NOVO</h2>
            <h1 class="titulo-principal">ESTILO AL CAPONE</h1>
            <div class="linha-dourada"></div>
            <p>Venha para um corte de cabelo, barba, acessórios e um ótimo ambiente.</p>
        </div>
    </section>

    <div id="authModal" class="modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10000;">
        <div class="modal-content">
            <span class="fechar-modal" onclick="fecharModal()">&times;</span>
            
            <div id="telaLogin" class="auth-form">
                <h2>BEM-VINDO DE VOLTA</h2>
                <input type="text" id="loginUser" placeholder="Seu CPF ou E-mail">
                
                <div class="input-senha-wrapper">
                    <input type="password" id="senhaLogin" placeholder="Sua Senha">
                    <span class="toggle-senha" onclick="alternarVisibilidadeSenha('senhaLogin', 'olhoAL', 'olhoFL')">
                        <svg id="olhoAL" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        <svg id="olhoFL" style="display:none;" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                    </span>
                </div>
                
                <button id="btnEntrarLogin" class="btn-dourado-full" onclick="simularLogin()">ENTRAR</button>
                <p class="link-rodape">Novo na El Capone? <a href="#" onclick="trocarAba('cadastro')">Cadastre-se</a></p>
            </div>

            <div id="telaCadastro" class="auth-form" style="display: none;">
                <h2>JUNTE-SE À ELITE</h2>
                <input type="text" id="nome" placeholder="Nome Completo" oninput="validarFormularioCadastro()">
                <input type="text" id="cpf" placeholder="CPF (Apenas números)" oninput="validarFormularioCadastro()">
                <input type="email" id="email" placeholder="E-mail" oninput="validarFormularioCadastro()">
                <input type="text" id="telefone" placeholder="Telefone / WhatsApp" oninput="validarFormularioCadastro()">
                
                <input type="date" id="dataNascimento" oninput="validarFormularioCadastro()" style="color-scheme: dark;">
                
                <div class="input-senha-wrapper">
                    <input type="password" id="senhaCadastro" placeholder="Sua Senha" oninput="validarFormularioCadastro()">
                    <span class="toggle-senha" onclick="alternarVisibilidadeSenha('senhaCadastro', 'olhoAC', 'olhoFC')">
                        <svg id="olhoAC" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        <svg id="olhoFC" style="display:none;" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                    </span>
                    <p id="msgSenha" class="hint-senha">Mínimo 8 caracteres (letras e números)</p>
                </div>
                
                <button id="btnCriarConta" class="btn-dourado-full" onclick="simularCadastro()" disabled>CRIAR CONTA</button>
                <p class="link-rodape">Já tem uma conta? <a href="#" onclick="trocarAba('login')">Faça Login</a></p>
            </div>
        </div> </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init();</script>
    <script src="js/main.js"></script>
</body>
</html>
